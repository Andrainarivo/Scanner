services:
  # 1. Redis : La file d'attente
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  # 2. API : Reçoit les requêtes HTTP (Léger, pas de droits root nécessaires)
  api:
    build: .
    container_name: nmap-api
    ports:
      - "5000:5000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis

  # 3. Worker : Fait le travail lourd (Nmap)
  worker:
    build: .
    container_name: nmap-worker
    # On surcharge la commande CMD du Dockerfile pour lancer Celery
    command: celery -A tasks worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    
    #cap_add:
    #  - NET_ADMIN
    #  - NET_RAW
    #  - NET_BIND_SERVICE
    #security_opt:
    #  - apparmor:unconfined
    #  - seccomp:unconfined
    
    # Pour éviter de tuer la machine hôte
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M